<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reksio Launcher</title>

    <style>
        :root {
            --bg: #10141f;
            --bar: rgba(18, 22, 33, 0.92);
            --bar-border: rgba(255, 255, 255, 0.12);
            --text: #f5f7fb;
            --muted: #a8b0c2;
            --accent: #f2b84b;
            --button: rgba(255, 255, 255, 0.1);
            --button-hover: rgba(255, 255, 255, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(242, 184, 75, 0.22), transparent 32%),
                radial-gradient(circle at bottom right, rgba(74, 126, 255, 0.18), transparent 34%),
                var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            height: 64px;
            padding: 0 18px;
            background: var(--bar);
            border-bottom: 1px solid var(--bar-border);
            backdrop-filter: blur(14px);
        }

        .brand {
            display: flex;
            flex-direction: column;
            min-width: 160px;
        }

        .brand-title {
            font-size: 17px;
            font-weight: 800;
            line-height: 1.1;
        }

        .brand-subtitle {
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
        }

        .game-tabs {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
            overflow-x: auto;
        }

        .game-button,
        .utility-button {
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            padding: 9px 14px;
            background: var(--button);
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
        }

        .game-button:hover,
        .utility-button:hover {
            background: var(--button-hover);
        }

        .game-button.active {
            background: var(--accent);
            color: #16120a;
            border-color: transparent;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .volume-control input {
            width: 120px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .volume-value {
            min-width: 36px;
            color: var(--text);
            font-weight: 700;
            text-align: right;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status {
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .game-frame {
            display: block;
            width: 100%;
            height: calc(100vh - 64px);
            border: 0;
            background: #000;
        }

        @media (max-width: 920px) {
            .top-bar {
                height: auto;
                min-height: 64px;
                align-items: flex-start;
                flex-direction: column;
                padding: 12px;
            }

            .brand {
                min-width: 0;
            }

            .game-tabs,
            .actions {
                width: 100%;
            }

            .actions {
                flex-wrap: wrap;
            }

            .game-frame {
                height: calc(100vh - 176px);
            }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="brand">
            <div class="brand-title">Reksio Launcher</div>
            <div class="brand-subtitle">Pi server edition</div>
        </div>

        <nav class="game-tabs" aria-label="Game selection">
            <button class="game-button active" data-game="pirates">
                🏴‍☠️ Pirates
            </button>

            <button class="game-button" data-game="ufo">
                🛸 UFO
            </button>
        </nav>

        <div class="volume-control">
            <span>🔊</span>
            <input id="volumeSlider" type="range" min="0" max="100" value="70" />
            <span id="volumeValue" class="volume-value">70%</span>
        </div>

        <div class="actions">
            <span class="status" id="status">Reksio and the Pirates</span>

            <button class="utility-button" onclick="openRawEngine()">
                Open raw
            </button>

            <button class="utility-button" onclick="goFullscreen()">
                Fullscreen
            </button>
        </div>
    </header>

    <iframe
        id="gameFrame"
        class="game-frame"
        src="/engine/?loader=github&source=reksioiskarbpiratow"
        allowfullscreen>
    </iframe>

    <script>
        const ENGINE_BASE = "/engine/";

        const games = {
            pirates: {
                title: "Reksio and the Pirates",
                source: "reksioiskarbpiratow"
            },
            ufo: {
                title: "Reksio and the UFO",
                source: "reksioiufo"
            }
        };

        const frame = document.getElementById("gameFrame");
        const statusText = document.getElementById("status");
        const buttons = document.querySelectorAll(".game-button");
        const volumeSlider = document.getElementById("volumeSlider");
        const volumeValue = document.getElementById("volumeValue");

        let volumeApplyInterval = null;

        function getGameUrl(game) {
            return `${ENGINE_BASE}?loader=github&source=${game.source}`;
        }

        function getVolume() {
            return Number(volumeSlider.value) / 100;
        }

        function applyVolume() {
            const volume = getVolume();

            volumeValue.textContent = `${Math.round(volume * 100)}%`;
            localStorage.setItem("reksioLauncherVolume", String(volumeSlider.value));

            try {
                const doc = frame.contentDocument;
                const win = frame.contentWindow;

                doc.querySelectorAll("audio, video").forEach((media) => {
                    media.volume = volume;
                    media.muted = volume === 0;
                });

                win.__reksioLauncherVolume = volume;
                win.dispatchEvent(new CustomEvent("reksio-launcher-volume-change", {
                    detail: {
                        volume
                    }
                }));
            } catch {
                // This only fails if the iframe becomes cross-origin.
            }
        }

        function selectGame(gameKey, shouldUpdateUrl = true) {
            const game = games[gameKey];

            if (!game) {
                return;
            }

            frame.src = getGameUrl(game);
            statusText.textContent = game.title;

            buttons.forEach((button) => {
                button.classList.toggle("active", button.dataset.game === gameKey);
            });

            if (shouldUpdateUrl) {
                const url = new URL(window.location.href);
                url.searchParams.set("game", gameKey);
                window.history.replaceState(null, "", url);
            }
        }

        function openRawEngine() {
            window.open(frame.src, "_blank");
        }

        function goFullscreen() {
            if (frame.requestFullscreen) {
                frame.requestFullscreen();
            }
        }

        buttons.forEach((button) => {
            button.addEventListener("click", () => {
                selectGame(button.dataset.game);
            });
        });

        volumeSlider.addEventListener("input", applyVolume);

        frame.addEventListener("load", () => {
            applyVolume();

            clearInterval(volumeApplyInterval);
            volumeApplyInterval = setInterval(applyVolume, 1000);
        });

        const savedVolume = localStorage.getItem("reksioLauncherVolume");

        if (savedVolume !== null) {
            volumeSlider.value = savedVolume;
        }

        const initialGame = new URLSearchParams(window.location.search).get("game") || "pirates";

        selectGame(initialGame, false);
        applyVolume();
    </script>
</body>
</html>
