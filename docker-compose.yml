services:
  reksio:
    build:
      context: .
    image: reksio-ui:local
    container_name: reksio-ui
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      NODE_ENV: production
      PORT: 3030
      REKSIO_DATA_DIR: /data
      MAX_ISO_SIZE_BYTES: 8589934592
    volumes:
      - ./data:/data
